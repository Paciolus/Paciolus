# Paciolus CI Pipeline — Sprint 210 (updated Sprint 555)
# Runs on every push to main and every PR targeting main.
#
# Jobs that MUST pass before merge (required status checks):
#   backend-tests, frontend-build, frontend-tests, backend-lint,
#   lint-baseline-gate, pip-audit-blocking, npm-audit-blocking,
#   bandit, secrets-scan, mypy-check, openapi-drift-check
#
# Advisory jobs (do not block merge):
#   pip-audit-advisory, npm-audit-advisory, merge-revert-guard, e2e-smoke
#
# See .github/DEPLOYMENT_GOVERNANCE.md for branch protection and deployment details.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Sprint 496: Least-privilege permissions — read-only by default
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Secrets Scanning (blocking) ──────────────────────────────
  # Sprint 496: Prevent committed secrets from reaching main
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6
        with:
          fetch-depth: 0

      - name: Install TruffleHog (pinned + checksum-verified)
        run: |
          TRUFFLEHOG_VERSION="3.93.8"
          EXPECTED_SHA256="b965dd2a4106dc3c194dfcaa93931fe0a93571261e3e1f46f2d1728b6612e019"
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz" \
            -o trufflehog.tar.gz
          echo "${EXPECTED_SHA256}  trufflehog.tar.gz" | sha256sum -c -
          tar -xzf trufflehog.tar.gz trufflehog
          mv trufflehog /usr/local/bin/trufflehog
          rm trufflehog.tar.gz

      - name: Scan for secrets (PR diff)
        if: github.event_name == 'pull_request'
        run: |
          trufflehog git file://. \
            --since-commit ${{ github.event.pull_request.base.sha }} \
            --fail \
            --no-update

      - name: Scan for secrets (push — last commit)
        if: github.event_name == 'push'
        run: |
          trufflehog git file://. \
            --since-commit ${{ github.event.before }} \
            --fail \
            --no-update

  # ── Backend Tests ────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          API_HOST=0.0.0.0
          API_PORT=8000
          CORS_ORIGINS=http://localhost:3000
          ENV_MODE=development
          DATABASE_URL=sqlite:///./test.db
          EOF

      - name: Run pytest (exclude slow tests on PRs)
        run: pytest tests/ -v --tb=short -q --cov=. --cov-report=term-missing --cov-fail-under=80 -m "not slow"

  # ── OpenAPI Schema Drift Check (Sprint 518: DEC F-020) ──────
  # Detects when backend Pydantic models diverge from the committed
  # OpenAPI snapshot. If drift is found, developers must run
  # `python scripts/generate_openapi_snapshot.py` and commit the result.
  openapi-drift-check:
    name: OpenAPI Schema Drift Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Check for OpenAPI drift
        run: python scripts/check_openapi_drift.py

  # ── Backend Tests (PostgreSQL) ──────────────────────────────
  backend-tests-postgres:
    name: Backend Tests (PostgreSQL 15)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: paciolus
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: paciolus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paciolus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install psycopg2-binary

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          API_HOST=0.0.0.0
          API_PORT=8000
          CORS_ORIGINS=http://localhost:3000
          ENV_MODE=development
          DATABASE_URL=sqlite:///./test.db
          EOF

      - name: Run pytest
        env:
          TEST_DATABASE_URL: postgresql://paciolus:testpass@localhost:5432/paciolus_test
        run: pytest tests/ -v --tb=short -q --cov=. --cov-report=term-missing --cov-fail-under=80 -m "not slow"

  # ── Slow Tests (nightly / main-only) ─────────────────────────
  backend-tests-slow:
    name: Backend Slow Tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          API_HOST=0.0.0.0
          API_PORT=8000
          CORS_ORIGINS=http://localhost:3000
          ENV_MODE=development
          DATABASE_URL=sqlite:///./test.db
          EOF

      - name: Run slow tests
        run: pytest tests/ -v --tb=short -q -m slow

  # ── Frontend Build ───────────────────────────────────────────
  frontend-build:
    name: Frontend Build + Lint
    runs-on: ubuntu-latest
    outputs:
      eslint_errors: ${{ steps.eslint_count.outputs.eslint_errors }}
      eslint_warnings: ${{ steps.eslint_count.outputs.eslint_warnings }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # pin: v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint (full report)
        run: |
          npx eslint . > eslint-full-report.txt 2>&1 || true
          tail -5 eslint-full-report.txt

      - name: Count eslint issues
        id: eslint_count
        run: |
          npx eslint . --format json 2>/dev/null | node -e "
            const data = require('fs').readFileSync('/dev/stdin','utf8');
            const files = JSON.parse(data);
            let errors = 0, warnings = 0;
            for (const f of files) {
              for (const m of f.messages || []) {
                if (m.severity === 2) errors++;
                else warnings++;
              }
            }
            console.log('eslint_errors=' + errors);
            console.log('eslint_warnings=' + warnings);
            process.stderr.write('ESLint errors: ' + errors + ' (baseline: 0), warnings: ' + warnings + ' (baseline: 0)\n');
          " >> "$GITHUB_OUTPUT" || true

      - name: Upload eslint report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # pin: v6
        with:
          name: eslint-lint-report
          path: frontend/eslint-full-report.txt
          retention-days: 30

  # ── Frontend Tests (blocking) ──────────────────────────────
  # Sprint 496: 1,345 tests exist but were never gated in CI
  frontend-tests:
    name: Frontend Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # pin: v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npx jest --ci --forceExit --coverage

  # ── Backend Lint ─────────────────────────────────────────────
  backend-lint:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest
    outputs:
      ruff_errors: ${{ steps.ruff_count.outputs.ruff_errors }}
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (statistics report)
        run: |
          ruff check . --statistics > ruff-statistics.txt 2>&1 || true
          cat ruff-statistics.txt

      - name: Run ruff (full report)
        run: |
          ruff check . --output-format concise > ruff-full-report.txt 2>&1 || true

      - name: Count ruff errors
        id: ruff_count
        run: |
          COUNT=$(ruff check . --output-format json 2>/dev/null | python -c "import json,sys; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          echo "ruff_errors=$COUNT" >> "$GITHUB_OUTPUT"
          echo "::notice::Ruff errors: $COUNT (baseline: 0)"

      - name: Upload ruff reports
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # pin: v6
        with:
          name: ruff-lint-report
          path: |
            backend/ruff-statistics.txt
            backend/ruff-full-report.txt
          retention-days: 30

  # ── Backend Type Check (baseline-gated) ─────────────────────
  # Mypy has ~1,009 pre-existing errors (systemic Column[int]/Decimal/float
  # mismatches + missing annotations). Gate: fail only if errors increase.
  mypy-check:
    name: Backend Type Check (mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run mypy (non-test source, baseline-gated)
        run: |
          BASELINE=$(python -c "import json; print(json.load(open('../.github/lint-baseline.json')).get('mypy', {}).get('total_errors', 1009))")
          mypy . --exclude tests/ --no-error-summary 2>&1 | tee mypy-report.txt || true
          CURRENT=$(grep -c ': error:' mypy-report.txt || echo 0)
          echo "mypy: current=$CURRENT, baseline=$BASELINE"
          if [ "$CURRENT" -gt "$BASELINE" ]; then
            echo "::error::mypy errors increased from $BASELINE to $CURRENT. Fix new type errors before merging."
            exit 1
          fi
          echo "✓ mypy errors within baseline ($CURRENT ≤ $BASELINE)"

  # ── Lint Baseline Gate (no increase) ─────────────────────────
  lint-baseline-gate:
    name: Lint Baseline Gate
    needs: [backend-lint, frontend-build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - name: Check ruff baseline
        env:
          RUFF_ERRORS: ${{ needs.backend-lint.outputs.ruff_errors }}
        run: |
          BASELINE=$(python -c "import json; print(json.load(open('.github/lint-baseline.json'))['ruff']['total_errors'])")
          CURRENT="${RUFF_ERRORS:-0}"
          echo "Ruff: current=$CURRENT, baseline=$BASELINE"
          if [ "$CURRENT" -gt "$BASELINE" ]; then
            echo "::error::Ruff errors increased from $BASELINE to $CURRENT. Fix new lint issues before merging."
            exit 1
          fi
          echo "✓ Ruff errors within baseline ($CURRENT ≤ $BASELINE)"

      - name: Check eslint baseline
        env:
          ESLINT_ERRORS: ${{ needs.frontend-build.outputs.eslint_errors }}
          ESLINT_WARNINGS: ${{ needs.frontend-build.outputs.eslint_warnings }}
        run: |
          BASELINE_ERR=$(python -c "import json; print(json.load(open('.github/lint-baseline.json'))['eslint']['total_errors'])")
          BASELINE_WARN=$(python -c "import json; print(json.load(open('.github/lint-baseline.json'))['eslint']['total_warnings'])")
          CURR_ERR="${ESLINT_ERRORS:-0}"
          CURR_WARN="${ESLINT_WARNINGS:-0}"
          echo "ESLint errors: current=$CURR_ERR, baseline=$BASELINE_ERR"
          echo "ESLint warnings: current=$CURR_WARN, baseline=$BASELINE_WARN"
          FAIL=0
          if [ "$CURR_ERR" -gt "$BASELINE_ERR" ]; then
            echo "::error::ESLint errors increased from $BASELINE_ERR to $CURR_ERR."
            FAIL=1
          fi
          if [ "$CURR_WARN" -gt "$BASELINE_WARN" ]; then
            echo "::error::ESLint warnings increased from $BASELINE_WARN to $CURR_WARN."
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then
            echo "Fix new lint issues before merging."
            exit 1
          fi
          echo "✓ ESLint within baseline (errors: $CURR_ERR ≤ $BASELINE_ERR, warnings: $CURR_WARN ≤ $BASELINE_WARN)"

  # ── SAST: Bandit Security Scanner (blocking) ─────────────────
  bandit:
    name: Security SAST (Bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (medium+ severity)
        run: bandit -r . -ll --exclude ./tests,./venv -f json -o bandit-report.json || true

      - name: Check for HIGH/CRITICAL findings
        run: |
          python -c "
          import json, sys
          with open('bandit-report.json') as f:
              report = json.load(f)
          high = [r for r in report.get('results', [])
                  if r.get('issue_severity') in ('HIGH',)
                  and r.get('issue_confidence') in ('HIGH', 'MEDIUM')]
          if high:
              print(f'::error::Bandit found {len(high)} HIGH-severity finding(s):')
              for r in high:
                  print(f'  {r[\"filename\"]}:{r[\"line_number\"]} - {r[\"issue_text\"]}')
              sys.exit(1)
          print('No HIGH-severity findings detected.')
          "

  # ── Accounting Policy Gate ───────────────────────────────────
  accounting-policy:
    name: Accounting Policy Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"
      - name: Run accounting policy guard
        run: python -m guards.accounting_policy_guard

  # ── Report Standards Gate ────────────────────────────────────
  report-standards:
    name: Report Standards Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run report standards validator
        run: python scripts/validate_report_standards.py

  # ── Documentation Consistency Gate ──────────────────────────
  doc-consistency:
    name: Documentation Consistency Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"
      - name: Run documentation consistency guard
        run: python -m guards.doc_consistency_guard

  # ── Dependency Audit: pip (blocking on HIGH/CRITICAL) ────────
  pip-audit-blocking:
    name: Python Dependency Audit (blocking)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit and project dependencies
        run: |
          pip install pip-audit
          pip install -r requirements.txt

      - name: Audit for HIGH/CRITICAL vulnerabilities
        run: pip-audit -r requirements.txt

  # ── Dependency Audit: pip (advisory — all severities) ────────
  pip-audit-advisory:
    name: Python Dependency Audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit and project dependencies
        run: |
          pip install pip-audit
          pip install -r requirements.txt

      - name: Audit all vulnerabilities (advisory)
        run: pip-audit -r requirements.txt --desc

  # ── Dependency Audit: npm (blocking on HIGH/CRITICAL) ────────
  npm-audit-blocking:
    name: Node Dependency Audit (blocking)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # pin: v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit for HIGH/CRITICAL vulnerabilities
        run: npm audit --omit=dev --audit-level=high

  # ── Merge Revert Guard (advisory) ────────────────────────────
  merge-revert-guard:
    name: Merge Revert Guard (advisory)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"

      - name: Detect silent reverts
        run: python scripts/detect_silent_reverts.py --pr-count 15 --overlap-threshold 3

  # ── Dependency Audit: npm (advisory — all severities) ────────
  npm-audit-advisory:
    name: Node Dependency Audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # pin: v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit all vulnerabilities (advisory)
        run: npm audit --omit=dev

  # ── E2E Smoke Tests (Playwright) ────────────────────────────
  # Requires SMOKE_USER and SMOKE_PASS secrets in GitHub Actions.
  # Runs on push to main and on PRs targeting main (skips gracefully if secrets unavailable).
  e2e-smoke:
    name: E2E Smoke Tests (Playwright)
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # pin: v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # pin: v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # pin: v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build frontend
        run: npm run build

      - name: Start backend
        working-directory: backend
        run: |
          cat > .env << 'EOF'
          API_HOST=0.0.0.0
          API_PORT=8000
          CORS_ORIGINS=http://localhost:3000
          ENV_MODE=development
          DATABASE_URL=sqlite:///./test.db
          EOF
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Start frontend
        run: |
          npx next start -p 3000 &
          sleep 5

      - name: Check smoke test secrets
        id: smoke_secrets
        run: |
          if [ -n "${{ secrets.SMOKE_USER }}" ] && [ -n "${{ secrets.SMOKE_PASS }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Smoke test secrets not available — skipping E2E tests (expected on external PRs)"
          fi

      - name: Run E2E smoke tests
        if: steps.smoke_secrets.outputs.available == 'true'
        env:
          SMOKE_USER: ${{ secrets.SMOKE_USER }}
          SMOKE_PASS: ${{ secrets.SMOKE_PASS }}
        run: npx playwright test e2e/smoke.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # pin: v6
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
